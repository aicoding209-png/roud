<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>إلى رُدينا</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Lottie -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <!-- Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JZC3J2D027"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-JZC3J2D027');</script>
  <style>
    :root {
      --bg-deep:    #0d0a0f;
      --gold:       #c9a96e;
      --gold-light: #e8d4a8;
      --gold-dim:   #7a6340;
      --red:        #c0392b;
      --text-body:  #d4c4a8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-deep);
      color: var(--text-body);
      font-family: 'Noto Naskh Arabic', 'Amiri', serif;
      min-height: 100vh;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 60px 20px 80px;
      position: relative; overflow-x: hidden;
    }
    body::before { display: none; }

    /* ── Lottie Background ── */
    #bgLottie {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      transition: opacity 2s ease;
    }
    #bgLottie.visible { opacity: 1; }
    #bgLottie svg {
      position: absolute !important;
      top: 50% !important;
      left: 50% !important;
      transform: translate(-50%, -50%) !important;
      min-width: 100% !important;
      min-height: 100% !important;
      width: auto !important;
      height: auto !important;
    }

    /* ── Stars ── */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .stars span {
      position: absolute; border-radius: 50%; background: var(--gold-light);
      animation: twinkle var(--d,3s) ease-in-out infinite alternate; opacity: 0;
    }
    @keyframes twinkle {
      0%   { opacity:0; transform:scale(.6); }
      100% { opacity:var(--op,.4); transform:scale(1.1); }
    }

    /* ── Butterfly wrappers ── */
    .bf-container {
      position: fixed; inset: 0; pointer-events: none; z-index: 2; overflow: hidden;
    }
    .bf-wrap {
      position: absolute;
      animation: bfFly var(--fly-dur,18s) var(--fly-ease,ease-in-out) var(--fly-delay,0s) infinite;
      opacity: 0;
    }
    .bf-wrap lottie-player, .bf-wrap .bf-anim {
      width: var(--bf-size,70px);
      height: var(--bf-size,70px);
      display: block;
    }
    @keyframes bfFly {
      0%   { transform: translate(0, 0) scaleX(var(--sx,1)); opacity:0; }
      4%   { opacity: var(--bf-op, 0.82); }
      25%  { transform: translate(var(--x25,30px), var(--y25,-40px)) scaleX(var(--sx,1)); }
      50%  { transform: translate(var(--x50,60px), var(--y50,20px))  scaleX(var(--sx,1)); }
      75%  { transform: translate(var(--x75,90px), var(--y75,-30px)) scaleX(var(--sx,1)); }
      96%  { opacity: var(--bf-op, 0.82); }
      100% { transform: translate(var(--xf,130px), var(--yf,0px))    scaleX(var(--sx,1)); opacity:0; }
    }

    /* ── Card ── */
    .letter-card {
      position: relative; z-index: 1; max-width: 760px; width: 100%;
      background: transparent;
      border: none;
      padding: 60px 56px 70px;
      animation: fadeUp .9s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
    .corner { display:none; }

    /* ── Typography ── */
    .header-to { text-align:center; font-family:'Amiri',serif; font-style:italic; font-size:1.05rem; color:var(--gold-dim); letter-spacing:.08em; margin-bottom:6px; }
    .header-name { text-align:center; font-family:'Amiri',serif; font-size:3.2rem; font-weight:700; color:var(--red); line-height:1.1; text-shadow:0 0 28px rgba(192,57,43,.6),0 0 60px rgba(192,57,43,.3), 0 2px 12px rgba(0,0,0,.95); margin-bottom:28px; }
    .fleuron { text-align:center; font-size:1.4rem; color:var(--gold); opacity:.7; margin-bottom:28px; }
    .dots { text-align:center; letter-spacing:.5em; color:var(--gold-dim); font-size:.7rem; margin:26px 0; }
    .opening-card { margin-bottom:0; padding:26px 28px; border:1px solid rgba(201,169,110,.2); border-radius:3px; background:rgba(0,0,0,.45); backdrop-filter:blur(6px); }
    .dedication-text { font-family:'Amiri',serif; font-size:1.08rem; line-height:2.3; color:var(--gold-light); text-align:center; border-inline-start:3px solid var(--red); padding-right:20px; margin-bottom:0; }
    .welcome-card { padding:26px 28px; border:1px solid rgba(201,169,110,.2); border-radius:3px; background:rgba(0,0,0,.4); backdrop-filter:blur(6px); }
    .welcome-text { font-family:'Amiri',serif; font-size:1.06rem; line-height:2.3; color:var(--gold-light); }
    .bridge-card { padding:26px 28px; border:1px solid rgba(201,169,110,.15); border-radius:3px; background:rgba(0,0,0,.4); backdrop-filter:blur(6px); border-inline-start:3px solid var(--gold-dim); }
    .bridge-text { font-family:'Noto Naskh Arabic',serif; font-size:1.03rem; line-height:2.3; color:var(--text-body); text-align:justify; }
    .body-text p { font-size:1.05rem; line-height:2.2; color:var(--text-body); margin-bottom:24px; text-align:justify; text-shadow: 0 1px 8px rgba(0,0,0,.9); }
    .r-name { color:var(--red); font-weight:700; text-shadow:0 0 14px rgba(192,57,43,.35); }
    .poem-block { border-inline-start:3px solid var(--gold-dim); padding:18px 24px 18px 16px; margin:28px 0; background:rgba(201,169,110,.03); border-radius:2px; font-family:'Amiri',serif; font-style:italic; font-size:1.08rem; line-height:2.6; color:var(--gold-light); text-align:center; }
    .pledge { margin:40px 0 32px; padding:28px 28px 28px 24px; border:1px solid var(--gold-dim); border-radius:3px; background:rgba(0,0,0,.45); backdrop-filter:blur(6px); }
    .pledge-title { font-family:'Amiri',serif; font-size:1.2rem; font-weight:700; color:var(--gold); margin-bottom:18px; }
    .pledge p { font-size:1.05rem; line-height:2.2; color:var(--text-body); margin-bottom:18px; }
    .pledge p:last-child { margin-bottom:0; }
    .closing { text-align:center; margin-top:44px; }
    .closing-lines { font-family:'Amiri',serif; font-size:1.12rem; line-height:2.7; color:var(--gold-light); margin-bottom:28px; }
    .closing-divider { width:120px; height:1px; background:linear-gradient(90deg,transparent,var(--gold-dim),transparent); margin:0 auto 26px; }
    .signature { font-family:'Amiri',serif; font-style:italic; font-size:1rem; color:var(--gold-dim); line-height:2; }
    @media(max-width:560px){
      .letter-card{padding:40px 24px 50px;}
      .header-name{font-size:2.3rem;}
      .body-text p{font-size:.97rem;}
      .opening-card,.welcome-card,.bridge-card,.pledge{padding:20px 18px;}
    }

    /* ── SPLASH ── */
    #splash { position:fixed; inset:0; background:transparent; z-index:9999; display:flex; align-items:center; justify-content:center; transition:opacity .8s ease; }
    #splash.hide { opacity:0; pointer-events:none; }
    #splash-inner { text-align:center; opacity:0; }
    #splash-fleuron { font-size:2.2rem; color:#c9a96e; opacity:.7; margin-bottom:16px; animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:.7;} 50%{transform:scale(1.15);opacity:1;} }
    #splash-title { font-family:'Amiri',serif; font-size:2.6rem; color:#e8d4a8; margin-bottom:10px; direction:rtl; }
    #splash-hint { font-family:'Noto Naskh Arabic',serif; font-size:.95rem; color:#7a6340; margin-bottom:28px; direction:rtl; }
    #pin-dots { display:flex; justify-content:center; gap:14px; margin-bottom:8px; }
    .dot { width:16px; height:16px; border-radius:50%; border:1.5px solid #7a6340; background:transparent; transition:background .2s,border-color .2s; }
    .dot.filled { background:#c9a96e; border-color:#c9a96e; }
    .dot.error  { background:#c0392b; border-color:#c0392b; }
    #error-msg { font-family:'Noto Naskh Arabic',serif; font-size:.85rem; color:#c0392b; height:20px; margin-bottom:14px; direction:rtl; }
    #keypad { display:grid; grid-template-columns:repeat(3,70px); gap:12px; justify-content:center; direction:ltr; }
    .key { width:70px; height:70px; border-radius:50%; background:rgba(201,169,110,.07); border:1.5px solid #3a2e1e; color:#c9a96e; font-family:'Amiri',serif; font-size:1.6rem; cursor:pointer; transition:background .15s,border-color .15s,transform .1s; }
    .key:hover  { background:rgba(201,169,110,.15); border-color:#7a6340; }
    .key:active { transform:scale(.92); }
    .key.empty  { background:transparent; border:none; cursor:default; }
    .key.del    { font-size:1.2rem; color:#7a6340; }

    /* ── Char Animation ── */
    .char-anim {
      display: inline-block;
      opacity: 0;
      animation: charFadeIn 0.2s ease forwards var(--cd, 0ms);
    }
    @keyframes charFadeIn { to { opacity: 1; } }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div id="bgLottie"></div>
<div class="bf-container" id="bfContainer"></div>

<article class="letter-card" id="letterCard" style="display:none"></article>

<!-- SPLASH PIN -->
<div id="splash">
  <div id="splash-inner">
    <div id="splash-fleuron">❦</div>
    <div id="splash-title">إلى <span style="color:#c0392b">رُدينا</span></div>
    <div id="splash-hint">أدخلي الرمز لتفتحي الرسالة</div>
    <div id="pin-container">
      <div id="pin-dots">
        <span class="dot" id="d0"></span><span class="dot" id="d1"></span>
        <span class="dot" id="d2"></span><span class="dot" id="d3"></span>
      </div>
      <div id="error-msg"></div>
      <div id="keypad">
        <button class="key" onclick="pressKey('1')">١</button>
        <button class="key" onclick="pressKey('2')">٢</button>
        <button class="key" onclick="pressKey('3')">٣</button>
        <button class="key" onclick="pressKey('4')">٤</button>
        <button class="key" onclick="pressKey('5')">٥</button>
        <button class="key" onclick="pressKey('6')">٦</button>
        <button class="key" onclick="pressKey('7')">٧</button>
        <button class="key" onclick="pressKey('8')">٨</button>
        <button class="key" onclick="pressKey('9')">٩</button>
        <button class="key empty"></button>
        <button class="key" onclick="pressKey('0')">٠</button>
        <button class="key del" onclick="deleteKey()">⌫</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Lottie animation data ──
let LOTTIE_DATA = null;

fetch('butterfly.json')
  .then(r => r.json())
  .then(data => {
    LOTTIE_DATA = data;
    initStars();
    initBgSky();
    // initButterflies تُستدعى فقط بعد إدخال الرمز الصحيح
  })
  .catch(err => console.error('خطأ في تحميل butterfly.json:', err));

// ── Lottie Background Sky ──
function initBgSky() {
  lottie.loadAnimation({
    container:  document.getElementById('bgLottie'),
    renderer:   'svg',
    loop:       true,
    autoplay:   true,
    path:       'Moon-night-Sky.json',
    rendererSettings: {
      preserveAspectRatio: 'xMidYMid slice'
    }
  });
  setTimeout(() => {
    document.getElementById('bgLottie').classList.add('visible');
    setTimeout(animateSplashText, 1000);
  }, 100);
}

// ── Animate splash text char by char ──
function animateSplashText() {
  var titleEl = document.getElementById('splash-title');
  var part1 = 'إلى ';
  var part2 = 'رُدينا';
  var html = '';
  [...part1].forEach(function(ch, i) {
    html += '<span class="char-anim" style="--cd:' + (i * 45) + 'ms">' + (ch === ' ' ? '&nbsp;' : ch) + '</span>';
  });
  html += '<span style="color:#c0392b">';
  [...part2].forEach(function(ch, i) {
    html += '<span class="char-anim" style="--cd:' + ((part1.length + i) * 45) + 'ms">' + ch + '</span>';
  });
  html += '</span>';
  titleEl.innerHTML = html;

  var inner = document.getElementById('splash-inner');
  inner.style.transition = 'opacity 0.4s ease';
  inner.style.opacity = '1';
}

// ── Stars ──
function initStars() {
  const sc = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('span');
    const sz = Math.random() * 2.2 + .6;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--op:${(Math.random()*.35+.1).toFixed(2)};animation-delay:${(Math.random()*5).toFixed(1)}s;`;
    sc.appendChild(s);
  }
}

// ── Lottie Butterflies ──
const container = document.getElementById('bfContainer');
function initButterflies() {
  const BF_COUNT  = 7;
  const BF_FILTERS = [
    'none',
    'hue-rotate(130deg) saturate(1.4)',
    'hue-rotate(90deg) saturate(1.15) brightness(1.05)',
    'hue-rotate(175deg) saturate(1.5) brightness(1.1)',
    'none',
    'hue-rotate(130deg) saturate(1.4)',
    'hue-rotate(90deg) saturate(1.15) brightness(1.05)',
  ];
  const SIZES = [38, 45, 35, 49, 42, 38, 45];

  function rand(min, max) { return Math.random() * (max - min) + min; }

  (function spawnButterflies() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const STRIP_H = vh / BF_COUNT;
    const BASE_DURS = [16, 18, 14, 20, 17, 15, 19];

    for (let i = 0; i < BF_COUNT; i++) {
      const wrap = document.createElement('div');
      wrap.className = 'bf-wrap';

      const size = SIZES[i];
      const dur  = BASE_DURS[i];
      const fromRight = (i % 2 === 0);
      const startX = fromRight ? vw - size - 10 : 10;
      const stripMid  = (i + 0.5) * STRIP_H;
      const jitter    = rand(-STRIP_H * 0.1, STRIP_H * 0.1);
      const startYpx  = Math.min(Math.max(stripMid + jitter, size), vh - size);
      const startYpct = (startYpx / vh) * 100;
      const travelX = fromRight ? -rand(100, 170) : rand(100, 170);
      const maxWobble = STRIP_H * 0.4;
      const wobble    = () => rand(-maxWobble, maxWobble);
      const delay   = (i / BF_COUNT) * dur;
      const opacity = rand(0.72, 0.9);

      wrap.style.cssText = [
        `left:${startX}px`,
        `top:${startYpct.toFixed(1)}%`,
        `--fly-dur:${dur}s`,
        `--fly-delay:-${delay.toFixed(1)}s`,
        `--bf-size:${size}px`,
        `--bf-op:${opacity}`,
        `--sx:${fromRight ? -1 : 1}`,
        `--x25:${travelX * 0.25}px`,
        `--y25:${wobble().toFixed(1)}px`,
        `--x50:${travelX * 0.5}px`,
        `--y50:${wobble().toFixed(1)}px`,
        `--x75:${travelX * 0.75}px`,
        `--y75:${wobble().toFixed(1)}px`,
        `--xf:${travelX}px`,
        `--yf:${wobble().toFixed(1)}px`,
      ].join(';');

      const animDiv = document.createElement('div');
      animDiv.className = 'bf-anim';
      animDiv.style.cssText = `width:${size}px;height:${size}px;filter:${BF_FILTERS[i]};`;
      wrap.appendChild(animDiv);
      container.appendChild(wrap);

      lottie.loadAnimation({
        container: animDiv,
        renderer: 'svg',
        loop: true,
        autoplay: true,
        animationData: LOTTIE_DATA,
      });
    }
  })();
}

// ── PIN ──
var entered = '', correct = '0909';
function pressKey(k) { if (entered.length >= 4) return; entered += k; updateDots(); if (entered.length === 4) checkCode(); }
function deleteKey() { entered = entered.slice(0,-1); updateDots(); document.getElementById('error-msg').textContent = ''; }
function updateDots() { for (var i=0;i<4;i++) { var d=document.getElementById('d'+i); d.classList.toggle('filled',i<entered.length); d.classList.remove('error'); } }
function checkCode() {
  if (entered === correct) { openLetter(); }
  else {
    for (var i=0;i<4;i++) document.getElementById('d'+i).classList.add('error');
    document.getElementById('error-msg').textContent = 'الرمز غير صحيح، حاولي مجدداً';
    setTimeout(function(){ entered=''; updateDots(); document.getElementById('error-msg').textContent=''; }, 1200);
  }
}

// ── محتوى الرسالة — لا يُحقن إلا بعد الرمز الصحيح ──
const LETTER_HTML = `
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <p class="header-to">إلى</p>
  <h1 class="header-name">رُدينا</h1>
  <div class="dots">· · · · ·</div>

  <div class="opening-card">
    <p class="dedication-text">
      إلى الأنثى تلك الأميرة التي لم تكن حضورًا عابرًا في حياتي،<br>
      بل أقبلت كالبشائر المؤجَّلة، تأتي في اكتمالها حين آن أوانها.
    </p>
  </div>

  <div class="dots">· · · · ·</div>

  <div class="welcome-card">
    <p class="welcome-text">
      أهلًا وسهلًا بمن طال انتظارُها، وتعاظم في القلب مقدارُها؛ حللتِ أهلًا، وسكنتِ في القلب موضعًا يليق بكِ. طابَ هذا العهد الذي شهده الله وباركه، وطابَ هذا الميثاق الذي أراده الله فأتمّه على خيرٍ ومودّة. بارك الله لنا، وبارك علينا، وجمع بيننا في خيرٍ إن شاء الله. مباركٌ علينا عقد قراننا، جعله الله عقدًا تنعقد به سعادتنا، وترتاح من بعده نفوسنا.
    </p>
  </div>

  <div class="dots">· · ·</div>

  <div class="bridge-card">
    <p class="bridge-text">
      حبيبتي، إنّ هذا الميثاق الغليظ الذي يجمعنا اليوم، ليس مجرد كلماتٍ تُكتب أو عهودٍ تُقطع، بل هو الثمرة الطيبة لغرسٍ بدأ بنظرة ثم ابتسامة ثم ضحكة، واستوى على سوقه حُبًّا ويقينًا. والآن، ونحن نقف على أعتاب هذه الحياة الجديدة، أجد قلبي يتلفتُ بامتنانٍ إلى الوراء، ليعيد قراءة الفصول الأولى من حكايتنا، تلك التي جعلت من هذا اليوم قدرًا محتومًا وجميلًا. تلك الحكاية التي ليس فيها حوارٌ ولا حديث، ولا لقاءٌ غير لقائنا الأول؛ هي حكايةٌ صامتة، تتحدّث فيها القلوب وتصمت فيها الألسن. حكايةٌ فرضت فيها العادات والتقاليد والشريعة على اللسان أن يسكت، فأطاع اللسان، لكنّ القلب عصى وأبى إلا أن يبوح في خلواته، وأبت ذكراكِ إلا أن تحوم في خيالي كطيفٍ لا يغيب. كنتُ أحملكِ في صمتي كما يحمل الفجرُ نوره قبل أن يُشرق، وكان قلبي يناجيكِ في كلّ دعاء، ويستحضر صورتكِ في كلّ سكينة، حتى جاء هذا اليوم الذي أذن الله فيه للسان أن ينطق، وللقلب أن يبوح بما كتمه طويلًا.
    </p>
  </div>

  <div class="dots">· · ·</div>

  <div class="body-text">
    <p><span class="r-name">رُدينا</span>،<br>
    يا وردتي ويا أميرة قلبي، من أين يبتدئ القلب حديثه عنكِ؟ أمن تلك اللحظة الأولى التي وقعت فيها عيني عليكِ، أم من ذلك الاضطراب العذب الذي سبق حضوركِ إليّ؟ وكأن قلبي كان، على نحوٍ خفيّ، يعرف أنّ أمرًا جليلًا على وشك أن يحدث، وأنّ القلب، من بعد تلك اللحظة، لن يعود كما كان أبدًا.</p>
    <p>دعيني أعود بكِ إلى ذلك المشهد الأول، إلى اللحظة التي دخلتِ فيها حياتي، لا كحدثٍ عابر، بل كتحوّلٍ كامل؛ بدّلتِ في داخلي ترتيب الأشياء، وأعدتِ للعمر معناه، وجعلتِ للحياة بعدكِ وجهًا آخر لا يشبه ما قبلكِ.</p>
    <p>في التاسع من سبتمبر، جلستُ وفي صدري شعورٌ لا أُحسن له تسمية، شيءٌ بين الشوق والرهبة، بين الترقّب والانجذاب، وكان الوقت يمضي ببطءٍ شديد، كأنّه يعرف أنّ خلف هذا الانتظار عمرًا كاملًا يقف على عتبته.</p>
    <p>بعدما أحسنتم الضيافة، وجاد الحديث بيننا بما جاد، جاءت تلك اللحظة التي تبدّلت فيها نظرتي للجمال، وأدركتُ أنني لم أكن أعرفه حقًا من قبل. مشيتُ مشتاقًا لأراكِ وأنا لا أدري: أكنتُ أمشي على قدميَّ، أم على لهفتي؟</p>
    <p>حتى إذا وقفتُ عند الباب، كنتِ أنتِ هناك... جالسةً في هدوءٍ أربكني، ومكتسيةً بجمالٍ لا يستعير ملامحه من أحد، جمالٍ يخصّكِ وحدكِ، وكأنّ الله حين صاغكِ، أراد لكِ أن تكوني على صورةٍ لا تتكرّر.</p>
    <p>رأيتكِ وأنتِ تضمّين أصابعكِ بخجل، وكأنّ الحياء نفسه كان يمرّ من بين يديكِ ويترك فيهما أثره الرقيق. وكان ذلك اللون الأحمر على أطراف يديكِ أكثر من تفصيلٍ عابر، كان لمسةً صغيرةً حملت من الجمال ما يكفي ليُقيم طويلًا في الذاكرة.</p>
    <p>كنتِ تنظرين إلى الأسفل، وفي ذلك السكون الوادع، شيءٌ يجعل المرء يقترب دون أن يخطو، ويحبّ دون أن يتكلّم، ويطمئنّ دون أن يعرف كيف.</p>
    <p>وعن ماذا أحدّثكِ يا وردتي؟ عن شعركِ؟ ذلك الذي ينساب على كتفيكِ كانسياب ليلٍ على نافذةٍ مضيئة، كسرٍّ جميل، كبستانٍ هادئ كان يخفي في خصلاته ما لا تملك اللغة أن تبوح به.</p>
    <p>وبينما كنتُ واقفًا أحاول أن أستوعب، في لحظةٍ واحدة، كلَّ هذا الجمال، قالوا لكِ: <em style="color:var(--gold-light)">انظري إليه.</em><br><br>
    فرفعتِ رأسكِ... ورفعتِ معه قلبي من موضعه.</p>
    <p>كانت تلك النظرة، وتلك الابتسامة، وحمرةُ وجهكِ، ووردُ خدّيكِ، كلُّ شيءٍ فيكِ يُكمل بعضه بعضًا، كأنكِ لوحةٌ ربّانيةٌ بديعة، تتآلف فيها المحاسن حتى تخطف القلب والعقل معًا.</p>
    <p>ولمّا استقرّت عيناكِ عليَّ، ابتعدتُ عن الباب، لا خجلًا، بل لأنني لم أحتمل تلك النظرة؛ كان جمالها أكبر من ثباتي، وأعمق من قدرتي على التماسك.</p>
  </div>

  <div class="dots">· · ·</div>
  <p style="text-align:center;font-family:'Amiri',serif;font-size:1.3rem;color:var(--gold);letter-spacing:.05em;margin-bottom:24px;">يا الله...</p>

  <div class="body-text">
    <p>ما كانت تلك ابتسامةً عابرة، ولا كانت مجرّد ملامح لطيفة ارتسمت على وجهكِ، بل كانت نافذةً انفتحت دفعةً واحدةً في صدري، وكانت نورًا دخلني بلا استئذان، وكانت سحرًا رقيقًا، غير أنّه أصاب أعمق مكانٍ في روحي.</p>
    <p>ومنذ تلك النظرة، لم تعد الأيام كما كانت، وصار للوقت إيقاعٌ آخر، وصار في الذاكرة وجهكِ وإن غبتِ، وصار في القلب موضعٌ لكِ لا يسعه أحدٌ سواكِ.</p>
    <p>كنتُ أزورُ بيتكِ في الخفاء كأنني ذاك العاشق الذي يجد في قرب الحبيب تلذذًا، وعشت معنى قول قيس:</p>
    <div class="poem-block">
      أمرُّ على الديارِ ديارِ ليلى &nbsp;·&nbsp; أُقبّلُ ذا الجدارَ وذا الجدارا<br>
      وما حبُّ الديارِ شغفنَ قلبي &nbsp;·&nbsp; ولكن حبُّ من سكنَ الديارا
    </div>
    <p>أنتِ لم تكوني مجرّد أنثى رأيتها، ولا مشهدًا جميلًا مرّ أمامي ثم مضى. أنتِ كنتِ اللحظة التي تغيّر بعدها ترتيب العالم في داخلي، ليصبح للحبّ معنى أصدق، وللانتظار معنى أعمق، وللدعاء معنى أعظم.</p>
    <p>واليوم، وقد صرتِ زوجتي، أشعر أنّ الله لم يرزقني زوجة فحسب، بل رزقني سكنًا، ومودّةً، ورحمةً، وقلبًا أودّ لو أقضي بقربه العمر كلّه، ممتنًّا لهذه النعمة في كل يوم.</p>
  </div>

  <div class="dots">· · ·</div>

  <div class="pledge">
    <div class="pledge-title">أعاهدكِ يا <span class="r-name">رُدينا</span>، يا زوجتي وحبيبتي،</div>
    <p>أن أبقى قريبًا من قلبكِ ما استطعت، صديقًا لكِ، حنونًا عليكِ، شريكًا لفرحكِ إذا أقبل، سندًا لكِ إذا مالت الأيام، ويدًا لا تفلت يدكِ إذا ضاقت الحياة واتّسع ثقلها.</p>
    <p>أعاهدكِ أن أحبّكِ كما أحببتكِ في تلك النظرة الأولى: بدهشةٍ لا تشيخ، وبرغبةٍ صادقة، وبقلبٍ يعرف يقينًا أنّ بعض الناس لا يدخلون حياتنا مصادفة، بل يدخلونها ليصبحوا الحياة نفسها.</p>
  </div>

  <div class="closing">
    <div class="closing-lines">
      يا <span class="r-name">رُدينا</span>،<br>
      يا صاحبة العينين اللتين قالتا، في لحظةٍ واحدة،<br>
      ما عجزت الكلمات عن قوله في زمنٍ كامل:<br><br>
      أهلًا بكِ في قلبي،<br>
      أهلًا بكِ في عمري،<br>
      أهلًا بكِ في أيامي كلّها،<br>
      وفي دعائي، وطمأنينتي،<br>
      أهلًا بكِ حبيبتي.
    </div>
    <div class="closing-divider"></div>
    <p style="font-family:'Amiri',serif;font-size:1.08rem;color:var(--text-body);line-height:2.2;margin-bottom:28px;">
      فأنتِ لستِ أنثى أحببتُها فحسب، أنتِ الأنثى التي، حين رأيتها، شعرتُ أنّ قلبي بلغ أخيرًا وجهته، ووصل، بعد طول ترحالٍ خفيّ، إلى موطنه.
    </p>
    <div class="fleuron">❦</div>
    <p class="signature" style="margin-top:20px;">
      بالحبّ وحده كتبتُ… وما كان سواه ليكتب.<br>
      زوجك إبراهيم
    </p>
  </div>
`;

function openLetter() {
  // 1. حقن المحتوى في الـ article
  const card = document.getElementById('letterCard');
  card.innerHTML = LETTER_HTML;
  card.style.display = '';

  // 2. تشغيل Scroll Reveal على العناصر المحقونة
  const obs2 = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.style.opacity='1'; e.target.style.transform='translateY(0)'; } });
  }, {threshold:.15});
  card.querySelectorAll('.body-text p, .pledge p').forEach((el, i) => {
    el.style.cssText += `opacity:0;transform:translateY(18px);transition:opacity .7s ${i*.07}s ease,transform .7s ${i*.07}s ease;`;
    obs2.observe(el);
  });

  // 3. إخفاء splash
  document.getElementById('pin-container').style.opacity = '0';
  document.getElementById('splash-hint').style.opacity  = '0';
  document.getElementById('splash-fleuron').style.opacity = '0';
  document.getElementById('splash-title').style.transition = 'opacity .4s';
  setTimeout(() => {
    document.getElementById('splash-title').style.opacity = '0';
  }, 200);

  var s = document.getElementById('splash');
  s.classList.add('hide');
  setTimeout(function(){
    s.style.display = 'none';
    initButterflies();
  }, 900);
}
</script>
