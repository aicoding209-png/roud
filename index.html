<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>إلى رُدينا</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Lottie -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

  <!-- ══ Firebase Compat SDK ══ -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <style>
    :root {
      --bg-deep:    #0d0a0f;
      --gold:       #c9a96e;
      --gold-light: #e8d4a8;
      --gold-dim:   #7a6340;
      --red:        #c0392b;
      --text-body:  #d4c4a8;

      /* ── Section colours ── */
      --rose:       #c4a0b8;
      --rose-text:  #f0d0e4;
      --rose-bg:    rgba(196,160,184,.06);
      --rose-bdr:   rgba(196,160,184,.28);

      --blue:       #6fa8d6;
      --blue-text:  #c8e0f4;
      --blue-bg:    rgba(111,168,214,.06);
      --blue-bdr:   rgba(111,168,214,.28);

      --green:      #8ec4a0;
      --green-text: #c8ecd8;
      --green-bg:   rgba(142,196,160,.06);
      --green-bdr:  rgba(142,196,160,.28);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-deep);
      color: var(--text-body);
      font-family: 'Noto Naskh Arabic', 'Amiri', serif;
      min-height: 100vh;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 60px 20px 80px;
      position: relative; overflow-x: hidden;
    }
    body::before { display: none; }

    /* ── Lottie Background ── */
    #bgLottie {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      transition: opacity 2s ease;
    }
    #bgLottie.visible { opacity: 1; }
    #bgLottie svg {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      transform: none !important;
      width: 100vw !important;
      height: 100vh !important;
    }

    /* ── Stars ── */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .stars span {
      position: absolute; border-radius: 50%; background: var(--gold-light);
      animation: twinkle var(--d,3s) ease-in-out infinite alternate; opacity: 0;
    }
    @keyframes twinkle {
      0%   { opacity:0; transform:scale(.6); }
      100% { opacity:var(--op,.4); transform:scale(1.1); }
    }

    /* ── Butterfly wrappers ── */
    .bf-container {
      position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden;
    }
    .bf-wrap {
      position: absolute;
      animation: bfFly var(--fly-dur,18s) var(--fly-ease,ease-in-out) var(--fly-delay,0s) infinite;
      opacity: 0;
    }
    .bf-wrap lottie-player, .bf-wrap .bf-anim {
      width: var(--bf-size,70px);
      height: var(--bf-size,70px);
      display: block;
    }
    @keyframes bfFly {
      0%   { transform: translate(0, 0) scaleX(var(--sx,1)); opacity:0; }
      4%   { opacity: var(--bf-op, 0.82); }
      25%  { transform: translate(var(--x25,30px), var(--y25,-40px)) scaleX(var(--sx,1)); }
      50%  { transform: translate(var(--x50,60px), var(--y50,20px))  scaleX(var(--sx,1)); }
      75%  { transform: translate(var(--x75,90px), var(--y75,-30px)) scaleX(var(--sx,1)); }
      96%  { opacity: var(--bf-op, 0.82); }
      100% { transform: translate(var(--xf,130px), var(--yf,0px))    scaleX(var(--sx,1)); opacity:0; }
    }

    /* ── Card ── */
    .letter-card {
      position: relative; z-index: 2; max-width: 760px; width: 100%;
      background: transparent;
      border: none;
      padding: 60px 56px 70px;
      animation: fadeUp .9s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
    .corner { display:none; }

    /* ── Typography ── */
    .header-to { text-align:center; font-family:'Amiri',serif; font-style:italic; font-size:1.05rem; color:var(--gold-dim); letter-spacing:.08em; margin-bottom:6px; }
    .header-name { text-align:center; font-family:'Amiri',serif; font-size:3.2rem; font-weight:700; color:var(--red); line-height:1.1; text-shadow:0 0 28px rgba(192,57,43,.6),0 0 60px rgba(192,57,43,.3), 0 2px 12px rgba(0,0,0,.95); margin-bottom:28px; }
    .fleuron { text-align:center; font-size:1.4rem; color:var(--gold); opacity:.7; margin-bottom:28px; }
    .dots { text-align:center; letter-spacing:.5em; color:var(--gold-dim); font-size:.7rem; margin:26px 0; }

    
  /* الإهداء */
.opening-card {
  margin-bottom: 0;
  padding: 32px 28px;
  border: none;
  background: transparent;
  position: relative;
  text-align: center;
}
.opening-card::before, .opening-card::after {
  content: '❧';
  display: block;
  text-align: center;
  font-size: 1.3rem;
  color: var(--red);
  opacity: .5;
  margin-bottom: 14px;
}
.opening-card::after { margin-bottom: 0; margin-top: 14px; }
.dedication-text {
  font-family: 'Amiri', serif;
  font-size: 1.15rem;
  line-height: 2.6;
  color: #e0d0d0;
  text-align: center;
  border: none;
  padding: 0;
  margin-bottom: 0;
  font-style: italic;
}

/* الترحيب */
.welcome-card {
  padding: 30px 32px;
  border-radius: 4px;
  border: 1px solid rgba(192,57,43,.2);
  border-bottom: 3px solid var(--red);
  background: rgba(192,57,43,.04);
  backdrop-filter: blur(6px);
}
.welcome-text {
  font-family: 'Amiri', serif;
  font-size: 1.06rem;
  line-height: 2.4;
  color: #e8d8d8;
  text-align: center;
}

    /* الحكاية الصامتة */
.bridge-card {
  padding: 30px 32px;
  border-radius: 4px;
  border: 1px solid rgba(148,61,106,.2);
  border-inline-end: 3px solid #943d6a;
  background: rgba(148,61,106,.06);
  backdrop-filter: blur(6px);
  position: relative;
}
.bridge-card::before {
  content: '"';
  position: absolute;
  top: 10px;
  right: 16px;
  font-family: 'Amiri', serif;
  font-size: 4rem;
  color: #943d6a;
  opacity: .15;
  line-height: 1;
}
.bridge-text {
  font-family: 'Amiri', serif;
  font-size: 1.03rem;
  line-height: 2.4;
  color: #d98aad;
  text-align: justify;
}
    
    
    
    .body-text p { 
  font-family: 'Amiri', serif;
  font-size:1.05rem; 
  line-height:2.2; 
  color:var(--text-body); 
  margin-bottom:24px; 
  text-align:justify; 
  text-shadow: 0 1px 8px rgba(0,0,0,.9); 
}
    .r-name { color:var(--red); font-weight:700; text-shadow:0 0 14px rgba(192,57,43,.35); }
    .poem-block { border-inline-start:3px solid var(--gold-dim); padding:18px 24px 18px 16px; margin:28px 0; background:rgba(201,169,110,.03); border-radius:2px; font-family:'Amiri',serif; font-style:italic; font-size:1.08rem; line-height:2.6; color:var(--gold-light); text-align:center; }

    
.pledge {
  margin: 40px 0 32px;
  padding: 40px 36px 36px;
  border: 1px solid rgba(201,169,110,.35);
  border-top: 3px solid var(--gold);
  border-radius: 4px;
  background: linear-gradient(160deg, rgba(201,169,110,.07) 0%, rgba(0,0,0,.5) 60%);
  backdrop-filter: blur(8px);
  position: relative;
  box-shadow: 0 0 40px rgba(201,169,110,.06), inset 0 1px 0 rgba(201,169,110,.1);
}
.pledge::before {
  content: '❦';
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-deep);
  padding: 0 14px;
  font-size: 1.5rem;
  color: var(--gold);
  opacity: .85;
}
.pledge-title {
  font-family: 'Amiri', serif;
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 22px;
  text-align: center;
  letter-spacing: .04em;
  text-shadow: 0 0 20px rgba(201,169,110,.3);
}
.pledge p {
  font-size: 1.06rem;
  line-height: 2.4;
  color: var(--gold-light);
  margin-bottom: 18px;
  text-align: justify;
  border-bottom: 1px solid rgba(201,169,110,.08);
  padding-bottom: 18px;
  font-family: 'Amiri', serif;
}
.pledge p:last-child {
  margin-bottom: 0;
  border-bottom: none;
  padding-bottom: 0;
}

    
    .closing { text-align:center; margin-top:44px; }
    .closing-lines { font-family:'Amiri',serif; font-size:1.12rem; line-height:2.7; color:var(--gold-light); margin-bottom:28px; }
    .closing-divider { width:120px; height:1px; background:linear-gradient(90deg,transparent,var(--gold-dim),transparent); margin:0 auto 26px; }
    .signature { font-family:'Amiri',serif; font-style:italic; font-size:1rem; color:var(--gold-dim); line-height:2; }
    @media(max-width:560px){
      .letter-card{padding:40px 24px 50px;}
      .header-name{font-size:2.3rem;}
      .body-text p{font-size:.97rem;}
      .opening-card,.welcome-card,.bridge-card,.pledge{padding:20px 18px;}
    }

    /* ── Story Section Cards ── */
    .story-label {
      text-align: center;
      font-family: 'Amiri', serif;
      font-size: .9rem;
      letter-spacing: .12em;
      margin: 4px 0 14px;
    }
    .story-card {
      border-radius: 6px;
      padding: 26px 28px;
      backdrop-filter: blur(6px);
    }
    .story-card p {
      font-family: 'Amiri', serif;
      font-size: 1.05rem;
      line-height: 2.35;
      text-align: justify;
      text-shadow: 0 1px 8px rgba(0,0,0,.9);
      margin-bottom: 20px;
    }
    .story-card p:last-child { margin-bottom: 0; }

    /* Rose — سماع الاسم */
    .story-card--rose {
      border: 1px solid var(--rose-bdr);
      border-inline-start: 3px solid var(--rose);
      background: var(--rose-bg);
    }
    .story-card--rose p { color: var(--rose-text); }
    .story-label--rose  { color: var(--rose); }

    /* Blue — رؤيتها */
    .story-card--blue {
      border: 1px solid var(--blue-bdr);
      border-inline-start: 3px solid var(--blue);
      background: var(--blue-bg);
    }
    .story-card--blue p { color: var(--blue-text); }
    .story-label--blue  { color: var(--blue); }

    /* Green — سماع صوتها */
    .story-card--green {
      border: 1px solid var(--green-bdr);
      border-inline-start: 3px solid var(--green);
      background: var(--green-bg);
    }
    .story-card--green p { color: var(--green-text); }
    .story-label--green { color: var(--green); }

    /* ── SPLASH ── */
    #splash { position:fixed; inset:0; background:transparent; z-index:9999; display:flex; align-items:center; justify-content:center; transition:opacity .8s ease; }
    #splash.hide { opacity:0; pointer-events:none; }
    #splash-inner { text-align:center; opacity:0; }
    #splash-fleuron { font-size:2.2rem; color:#c9a96e; opacity:.7; margin-bottom:16px; animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:.7;} 50%{transform:scale(1.15);opacity:1;} }
    #splash-title { font-family:'Amiri',serif; font-size:2.6rem; color:#e8d4a8; margin-bottom:10px; direction:rtl; }
    #splash-hint { font-family:'Noto Naskh Arabic',serif; font-size:.95rem; color:#7a6340; margin-bottom:28px; direction:rtl; }
    #pin-dots { display:flex; justify-content:center; gap:14px; margin-bottom:8px; }
    .dot { width:16px; height:16px; border-radius:50%; border:1.5px solid #7a6340; background:transparent; transition:background .2s,border-color .2s; }
    .dot.filled { background:#c9a96e; border-color:#c9a96e; }
    .dot.error  { background:#c0392b; border-color:#c0392b; }
    #error-msg { font-family:'Noto Naskh Arabic',serif; font-size:.85rem; color:#c0392b; height:20px; margin-bottom:14px; direction:rtl; }
    #keypad { display:grid; grid-template-columns:repeat(3,70px); gap:12px; justify-content:center; direction:ltr; }
    .key { width:70px; height:70px; border-radius:50%; background:rgba(201,169,110,.07); border:1.5px solid #3a2e1e; color:#c9a96e; font-family:'Amiri',serif; font-size:1.6rem; cursor:pointer; transition:background .15s,border-color .15s,transform .1s; }
    .key:hover  { background:rgba(201,169,110,.15); border-color:#7a6340; }
    .key:active { transform:scale(.92); }
    .key.empty  { background:transparent; border:none; cursor:default; }
    .key.del    { font-size:1.2rem; color:#7a6340; }

    /* ── Word Animation ── */
    .word-anim {
      display: inline-block;
      opacity: 0;
      transform: translateY(8px);
    }
    .word-anim.go {
      animation: wordFadeIn 0.3s ease forwards var(--wd, 0ms);
    }
    @keyframes wordFadeIn {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div id="bgLottie"></div>
<div class="bf-container" id="bfContainer"></div>

<article class="letter-card" id="letterCard" style="display:none"></article>

<!-- SPLASH PIN -->
<div id="splash">
  <div id="splash-inner">
    <div id="splash-fleuron">❦</div>
    <div id="splash-title">إلى <span style="color:#c0392b">رُدينا</span></div>
    <div id="splash-hint">أدخلي الرمز لتفتحي الرسالة</div>
    <div id="pin-container">
      <div id="pin-dots">
        <span class="dot" id="d0"></span><span class="dot" id="d1"></span>
        <span class="dot" id="d2"></span><span class="dot" id="d3"></span>
      </div>
      <div id="error-msg"></div>
      <div id="keypad">
        <button class="key" onclick="pressKey('1')">١</button>
        <button class="key" onclick="pressKey('2')">٢</button>
        <button class="key" onclick="pressKey('3')">٣</button>
        <button class="key" onclick="pressKey('4')">٤</button>
        <button class="key" onclick="pressKey('5')">٥</button>
        <button class="key" onclick="pressKey('6')">٦</button>
        <button class="key" onclick="pressKey('7')">٧</button>
        <button class="key" onclick="pressKey('8')">٨</button>
        <button class="key" onclick="pressKey('9')">٩</button>
        <button class="key empty"></button>
        <button class="key" onclick="pressKey('0')">٠</button>
        <button class="key del" onclick="deleteKey()">⌫</button>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  Firebase — تسجيل الزيارات التاريخية
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyC1iZY91Gcl7-mYJv9W7xxSqZsQp5yVLpA",
  authDomain:        "roud-14312.firebaseapp.com",
  databaseURL:       "https://roud-14312-default-rtdb.firebaseio.com",
  projectId:         "roud-14312",
  storageBucket:     "roud-14312.firebasestorage.app",
  messagingSenderId: "773994641024",
  appId:             "1:773994641024:web:b324e6cdc82f287d2ed865"
};
firebase.initializeApp(firebaseConfig);
var fbDB = firebase.database();

// تُستدعى فقط بعد إدخال الرمز الصحيح
function startVisitTracking() {
  var visitRef = fbDB.ref('visits').push();
  visitRef.set({
    enteredAt: firebase.database.ServerValue.TIMESTAMP,
    status:    'online',
    userAgent: navigator.userAgent,
    referrer:  document.referrer || 'direct',
    page:      location.pathname
  });
  // عند إغلاق التبويب أو المتصفح يُحدَّث تلقائيًا
  visitRef.onDisconnect().update({
    status:  'offline',
    leftAt:  firebase.database.ServerValue.TIMESTAMP
  });
}

// ══════════════════════════════════════════════
//  Lottie animation data
// ══════════════════════════════════════════════
var LOTTIE_DATA = null;

fetch('butterfly.json')
  .then(function(r){ return r.json(); })
  .then(function(data){
    LOTTIE_DATA = data;
    initStars();
    initBgSky();
  })
  .catch(function(err){ console.error('خطأ في تحميل butterfly.json:', err); });

// ── Lottie Background Sky ──
function initBgSky() {
  lottie.loadAnimation({
    container:  document.getElementById('bgLottie'),
    renderer:   'svg',
    loop:       true,
    autoplay:   true,
    path:       'Moon-night-Sky.json',
    rendererSettings: { preserveAspectRatio: 'xMidYMid slice' }
  });
  setTimeout(function(){
    document.getElementById('bgLottie').classList.add('visible');
    setTimeout(animateSplashText, 1000);
  }, 100);
}

// ── Animate splash text word by word ──
function animateSplashText() {
  var titleEl = document.getElementById('splash-title');
  titleEl.innerHTML =
    '<span class="word-anim" style="--wd:0ms">إلى</span> ' +
    '<span class="word-anim" style="--wd:220ms; color:#c0392b">رُدينا</span>';
  titleEl.querySelectorAll('.word-anim').forEach(function(w){ w.classList.add('go'); });

  var inner = document.getElementById('splash-inner');
  inner.style.transition = 'opacity 0.4s ease';
  inner.style.opacity = '1';
}

// ── Stars ──
function initStars() {
  var sc = document.getElementById('stars');
  for (var i = 0; i < 120; i++) {
    var s  = document.createElement('span');
    var sz = Math.random() * 2.2 + .6;
    s.style.cssText = 'width:'+sz+'px;height:'+sz+'px;top:'+(Math.random()*100)+'%;left:'+(Math.random()*100)+'%;--d:'+(Math.random()*4+2).toFixed(1)+'s;--op:'+(Math.random()*.35+.1).toFixed(2)+';animation-delay:'+(Math.random()*5).toFixed(1)+'s;';
    sc.appendChild(s);
  }
}

// ── Lottie Butterflies ──
var container = document.getElementById('bfContainer');
function initButterflies() {
  var BF_COUNT   = 7;
  var BF_FILTERS = [
    'none',
    'hue-rotate(130deg) saturate(1.4)',
    'hue-rotate(90deg) saturate(1.15) brightness(1.05)',
    'hue-rotate(175deg) saturate(1.5) brightness(1.1)',
    'none',
    'hue-rotate(130deg) saturate(1.4)',
    'hue-rotate(90deg) saturate(1.15) brightness(1.05)',
  ];
  var SIZES    = [28, 25, 25, 27, 22, 28, 25];
  var BASE_DURS= [16, 18, 14, 20, 17, 15, 19];

  function rand(min, max){ return Math.random()*(max-min)+min; }

  var vw = window.innerWidth, vh = window.innerHeight;
  var STRIP_H = vh / BF_COUNT;

  for (var i = 0; i < BF_COUNT; i++) {
    var wrap     = document.createElement('div');
    wrap.className = 'bf-wrap';
    var size     = SIZES[i];
    var dur      = BASE_DURS[i];
    var fromRight= (i % 2 === 0);
    var startX   = fromRight ? vw - size - 10 : 10;
    var stripMid = (i + 0.5) * STRIP_H;
    var jitter   = rand(-STRIP_H * 0.1, STRIP_H * 0.1);
    var startYpx = Math.min(Math.max(stripMid + jitter, size), vh - size);
    var startYpct= (startYpx / vh) * 100;
    var travelX  = fromRight ? -rand(100, 170) : rand(100, 170);
    var maxWobble= STRIP_H * 0.4;
    var wobble   = function(){ return rand(-maxWobble, maxWobble); };
    var delay    = (i / BF_COUNT) * dur;
    var opacity  = rand(0.72, 0.9);

    wrap.style.cssText = [
      'left:'+startX+'px',
      'top:'+startYpct.toFixed(1)+'%',
      '--fly-dur:'+dur+'s',
      '--fly-delay:-'+delay.toFixed(1)+'s',
      '--bf-size:'+size+'px',
      '--bf-op:'+opacity,
      '--sx:'+(fromRight ? -1 : 1),
      '--x25:'+(travelX*0.25).toFixed(1)+'px',
      '--y25:'+wobble().toFixed(1)+'px',
      '--x50:'+(travelX*0.5).toFixed(1)+'px',
      '--y50:'+wobble().toFixed(1)+'px',
      '--x75:'+(travelX*0.75).toFixed(1)+'px',
      '--y75:'+wobble().toFixed(1)+'px',
      '--xf:'+travelX.toFixed(1)+'px',
      '--yf:'+wobble().toFixed(1)+'px',
    ].join(';');

    var animDiv = document.createElement('div');
    animDiv.className = 'bf-anim';
    animDiv.style.cssText = 'width:'+size+'px;height:'+size+'px;filter:'+BF_FILTERS[i]+';';
    wrap.appendChild(animDiv);
    container.appendChild(wrap);

    lottie.loadAnimation({
      container: animDiv,
      renderer: 'svg',
      loop: true,
      autoplay: true,
      animationData: LOTTIE_DATA,
    });
  }
}

// ── PIN ──
var entered = '', correct = '0909';
function pressKey(k){ if(entered.length>=4) return; entered+=k; updateDots(); if(entered.length===4) checkCode(); }
function deleteKey(){ entered=entered.slice(0,-1); updateDots(); document.getElementById('error-msg').textContent=''; }
function updateDots(){ for(var i=0;i<4;i++){var d=document.getElementById('d'+i);d.classList.toggle('filled',i<entered.length);d.classList.remove('error');} }
function checkCode(){
  if(entered===correct){ openLetter(); }

    </p>

      <span class="r-name" style="font-size:1.2rem;">الياء</span> — يقينٌ لا يُخالطُه شكّ، ويُسرٌ بعد عسرٍ طويل، ويدٌ إذا امتدّتْ، امتدّ معها الحنان كلّه. أنتِ الياءُ التي يَنتهي عندها بحثي، ويَبدأُ عندها سكوني.

  <div class="story-label story-label--blue">❧&ensp;حين رأيتُكِ&ensp;❧</div>
  <div class="story-card story-card--blue">
    <p>
      <span class="r-name">رُدينا</span>,<br>
      يا وردتي وأميرة قلبي، من أيّ نقطة يبدأ الكلام؟ أمن تلك اللحظة التي وقعت فيها العين عليكِ لأول مرة، أم مما سبقها من اضطراب عذب لا تفسير له؟ كأن القلب كان يعرف، بحاسّة مجهولة لا يُحسن تسميتها، أن شيئًا جسيمًا يقترب، وأنه لن يخرج من تلك اللحظة كما دخلها.
    </p>
    <p>
      دعيني أعود إلى ذلك المشهد الذي دخلتِ فيه حياتي لا كما يدخل الحادث العابر، بل كما يحدث التحوّل الذي لا رجعة بعده؛ أعدتِ ترتيب الأشياء في الداخل، وأرجعتِ للعمر معنى كان يكاد يُنسى، وجعلتِ لما بعدكِ وجهًا لا يشبه ما قبلكِ في شيء.
    </p>
    <p>
      <span style="color:#6fa8d6;font-weight:600;">في التاسع من سبتمبر</span>، جلستُ وفي صدري ما لا أعرف له اسمًا محددًا؛ شوقٌ يخالطه شيءٌ من الرهبة، وترقّبٌ يمتزج بانجذابٍ لا يُقاوَم. وكان الوقت يسير ببطء غير معهود، كأنه يعلم أن ثمة عمرًا كاملًا ينتظر خلف تلك الدقائق.
    </p>
    <p>
      وحين أحسنتم الضيافة، وجرى الحديث مجراه، جاءت اللحظة التي تبدّلت فيها صورة الجمال أمامي، وأدركتُ أنني لم أكن قد عرفته حقًا من قبل. مشيتُ مشتاقًا إليكِ ولا أدري: أكانت قدماي تحملانني، أم كانت اللهفة هي التي تمشي؟
    </p>
    <p>
      وحين وقفتُ عند الباب، كنتِ أنتِ هناك. جالسةً في هدوءٍ كان له وقعٌ عجيب، تكتسين جمالًا لا يستعير ملامحه من أحد، جمالًا خاصًا بكِ لا يتكرر، كأن الله حين صاغكِ أراد أن يجعل منكِ صورةً لا تُنسَخ.
    </p>
    <p>
      رأيتُكِ تضمّين أصابعكِ بخجل، كأن الحياء نفسه كان يمرّ من بين يديكِ ويترك فيهما أثره الرقيق. وكان ذلك اللون الأحمر على أطراف يديكِ أكثر من تفصيلٍ هامشي؛ كان لمسةً صغيرة حملت من الجمال ما يكفي لأن يُقيم طويلًا في الذاكرة.
    </p>
    <p>
      وكنتِ تنظرين إلى الأسفل، وفي ذلك السكون الوادع شيءٌ غريب يجعل المرء يقترب دون أن يخطو، ويُحبّ دون أن يتكلم، ويطمئن دون أن يدري من أين جاءت تلك الطمأنينة.
    </p>
    <p>
      وكيف أصف شعركِ يا وردتي؟ لن أصفه. الوصف يقع على ما تستوعبه العين وتنتهي إليه، وشعركِ لا ينتهي. هو كلامٌ لم تنطقي به يومًا، يقوله الليل عنكِ وأنتِ نائمة وأنتِ مستيقظة، تحملينه على كتفيكِ ولا تدرين. ورأيتُه، فعلمتُ أن ثمة أشياء خُلقت لترى لا لتُقال، ومن أراد قولها أساء إليها. وأنا لا أريد أن أُسيء.
    </p>
    <p>
      وبينما كنتُ واقفًا أحاول أن أستوعب المشهد، قالوا لكِ: <em style="color:var(--gold-light)">انظري إليه.</em><br><br>
      فرفعتِ رأسكِ... ورفعتِ معه قلبي من موضعه.
    </p>
    <p>
      وحتى استقرّت عيناكِ عليَّ، توقّف الزمن وحلَّ الصمت، وتبعثرت أفكاري حتى جمعتُها مرةً أخرى فعاد الزمن من جديد، واستدركتُ الحدث فابتعدتُ عن الباب سريعًا. لكن لم يكن ذلك خجلًا، بل كان انذهالًا؛ تلك النظرة كانت أقوى من ثباتي وأكبر من قدرتي على التماسك. لم يكن إبعاد بصري عنكِ جفاءً ولا كان اختيارًا واعيًا، بل كان ارتباك الروح حين يداهمها ما لا تحتمل. حدث كل شيء بسرعةٍ أربكتني، كمن يفاجئه شيءٌ مندفعٌ نحوه فيتراجع بلا تفكير، لا خوفًا مما رأى بل من شدة ما أحسّ. لم أتوقع، ولم أستعد، ولم أرى إلا تلك الابتسامة الصامتة التي دفعتني بعيدًا بينما الصدمة وحدها كانت تتكفّل بكل شيء.
    </p>
    <p>
      لم تكن تلك الابتسامة عابرة، ولم تكن ملامح لطيفة ارتسمت على وجهكِ ثم مضت. كانت نافذةً انفتحت في صدري دفعةً واحدة، ونورًا دخل بلا استئذان، وسحرًا رقيقًا أصاب أعمق مكانٍ في الروح.
    </p>
    <p>
      ومنذ تلك النظرة لم تعد الأيام كما كانت. صار للوقت إيقاعٌ لم يكن يعرفه من قبل، وصار في الذاكرة وجهكِ وإن غبتِ، وصار في القلب موضعٌ لكِ لا يتّسع لسواكِ.
    </p>

  <div class="story-label story-label--green">❧&ensp;حين سمعتُ صوتكِ&ensp;❧</div>
  <div class="story-card story-card--green">
    <p>
      وإن كان الاسمُ قد سكنَ القلبَ، فالصوتُ قد استوطن الروحَ كلَّها. ذلك اليومُ الذي سمعتُ فيه صوتَكِ كانَ يومَ السبت، السادسَ من أبريل — ذلك اليومُ الذي لا يعرفُ هو كم يَعني لي، ولا يدري أنّي أُحبُّه بقدرِ ما أُحبُّ كلَّ ما منحَني إيّاه. يومُ السبت هو اليومُ ذاتُه الذي رأيتُكِ فيه لأوّلِ مرّة، وسمعتُ فيه صوتَكِ لأوّلِ مرّة. يومٌ واحد احتملَ كلَّ هذا الجمال، فكيفَ لا أُحبَّه؟
    </p>
    <p>
      كنتِ تتحدّثينَ مع أمّي، فطلبتُ منها — بإشارةٍ واحدة — أن ترفعَ الصوت. وفي تلك الثانيةِ التي سبقَتْ أن تنطقي، كانت الدنيا كلُّها صامتةً كأنّها تعرفُ أنّ شيئًا نادرًا على وشكِ الحدوث.
    </p>
    <p>
      ثمّ تكلّمتِ. فعّم الصمت داخلي وتبسمت وحبست انفاسي حتى استشعرَ ذلك الصوت... صوتكِ لم تترجمه أذني كـ موجاتٍ صوتيةً تُسمَع، بل أمواج بحريةٌ باردةٌ مرّت من أذني ونزلت على قلبي، فأخمدتْ حرائقه كلّها. كان صوتكِ يشبه أشياءَ كثيرةً: كمثل نوتةً موسيقيةً تاهت من عصورٍ بعيدة ثم وجدت مأواها في أذني، وكصوتَ الرياحِ وهي تتسلّل من شباكِ بيتٍ صغيرٍ في غابة، تحتَ جوٍّ ممطر، فتحرّكُ الستائرَ برفق، وتوقظُ في القلبِ شوقًا لا يعرفُ النسيان. كأنّ البراءةَ لم تُفارقْه يومًا، هادئٌ كأنّه يخشى أن يُزعجَ الهواءَ من حوله. لم يكن صوتًا عاديًّا، كان شيئًا تعجزُ عن وصفه العبارات وتستسلمُ أمامه الكلمات. وقفتُ لا بجسدي فحسب، بل بكلِّ ما فيّ — وأنا أسمعُ وأتمنّى ألّا تنتهين. وخطرَ ببالي في تلك اللحظةِ تمنٍّ واحد، بسيطٌ وصعب أيضًا: أن أسمعَ اسمي بذلك الصوت. أن تنطقَ لسانُكِ حروفَه كما تنطقُ بكلِّ شيء — بنعومةٍ تُشبهُكِ، وهدوءٍ يسكنُ القلبَ قبلَ أن يصلَ الأذن.
    </p>
  </div>

  <div class="body-text">
    <p>وفي حكايتنا الصامتة يا حبيبتي، هناك أشياء خفيّة لا يعلمها أحدٌ من البشر، ولا أدري لماذا كنتُ أقوم بها.</p>
    <p>من تلك الأشياء، كنتُ أمرُّ بجوار ِبيتكم في الخفاء كأنني ذاك العاشق الذي يجد في قرب الحبيب تلذذًا، وعشتُ معنى قول قيس:</p>
    <div class="poem-block">
      أمرُّ على الديارِ ديارِ ليلى<br>
      أُقبّلُ ذا الجدارَ وذا الجدارا<br><br>
      وما حبُّ الديارِ شغفنَ قلبي<br>
      ولكن حبُّ من سكنَ الديارا
    </div>
    <p>أنتِ لم تكوني مجرّد أنثى رأيتها، ولا مشهدًا جميلًا مرّ أمامي ثم مضى. أنتِ كنتِ اللحظة التي تغيّر بعدها ترتيب العالم في داخلي، ليصبح للحبّ معنى أصدق، وللانتظار معنى أعمق، وللدعاء معنى أعظم.</p>
    <p>واليوم، وقد صرتِ زوجتي، أشعر أنّ الله لم يرزقني زوجة فحسب، بل رزقني سكنًا، ومودّةً، ورحمةً، وقلبًا أودّ لو أقضي بقربه العمر كلّه، ممتنًّا لهذه النعمة في كل يوم.</p>
  </div>

    <p>أن أبقى قريبًا من قلبكِ ما استطعت، صديقًا لكِ، حنونًا عليكِ، شريكًا لفرحكِ إذا أقبل، سندًا لكِ إذا مالت الأيام، ويدًا لا تفلت يدكِ إذا ضاقت الحياة واتّسع ثقلها.</p>
    <p>أعاهدكِ أن أحبّكِ كما أحببتكِ في تلك النظرة الأولى: بدهشةٍ لا تشيخ، وبرغبةٍ صادقة، وبقلبٍ يعرف يقينًا أنّ بعض الناس لا يدخلون حياتنا مصادفة، بل يدخلونها ليصبحوا الحياة نفسها.</p>

      بالحبّ وحده كتبتُ بقلمي… وما كان سواه ليكتب.<br>
      <span style="display:flex; justify-content:flex-end; align-items:center; gap:12px; margin-top:40px;">
        <span style="color:var(--red);">زوجك إبراهيم</span>
        <img src="sign.png" alt="" style="height:55px; width:auto; vertical-align:middle;">
      </span>
    </p>
  </div>
`;

function animateLetterHeader(card) {
  var headerTo = card.querySelector('.header-to');
  headerTo.innerHTML = '<span class="word-anim" style="--wd:0ms">إلى</span>';
  headerTo.style.opacity = '1';
  headerTo.querySelector('.word-anim').classList.add('go');

  var headerName = card.querySelector('.header-name');
  headerName.innerHTML = '<span class="word-anim" style="--wd:280ms">رُدينا</span>';
  headerName.style.opacity = '1';
  headerName.querySelector('.word-anim').classList.add('go');

  var rest = card.querySelectorAll('.dots, .opening-card, .welcome-card, .bridge-card, .story-label, .story-card, .body-text, .pledge, .closing, .fleuron');
  rest.forEach(function(el){
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.5s ease';
  });
  setTimeout(function(){ rest.forEach(function(el){ el.style.opacity='1'; }); }, 750);
}

function wrapWordsInElement(el) {
  var walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
  var textNodes = [];
  var node;
  while((node = walker.nextNode())){ textNodes.push(node); }
  var idx = 0;
  textNodes.forEach(function(tn){
    if(tn.textContent.trim()==='') return;
    var parts = tn.textContent.split(/(\s+)/);
    var frag  = document.createDocumentFragment();
    parts.forEach(function(part){
      if(/^\s+$/.test(part)){
        frag.appendChild(document.createTextNode(part));
      } else if(part!==''){
        var s = document.createElement('span');
        s.className = 'word-anim';
        s.style.setProperty('--wd', (idx*55)+'ms');
        s.textContent = part;
        frag.appendChild(s);
        idx++;
      }
    });
    tn.parentNode.replaceChild(frag, tn);
  });
}

function applyWordAnimation(card) {
  var targets = card.querySelectorAll(
    '.dedication-text, .welcome-text, .bridge-text, ' +
    '.story-card p, ' +
    '.body-text p, .poem-block, .pledge-title, .pledge p, ' +
    '.closing-lines, .signature'
  );
  targets.forEach(function(el){ wrapWordsInElement(el); });
  var obs = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        e.target.querySelectorAll('.word-anim').forEach(function(w){ w.classList.add('go'); });
        obs.unobserve(e.target);
      }
    });
  }, { threshold: 0.1 });
  targets.forEach(function(el){ obs.observe(el); });
}

function openLetter() {
  var card = document.getElementById('letterCard');
  card.innerHTML = LETTER_HTML;
  card.style.display = '';

  document.getElementById('bgMusic').play();

  // ── بدء تتبع الزيارة في Firebase ──
  startVisitTracking();

  animateLetterHeader(card);
  setTimeout(function(){ applyWordAnimation(card); }, 800);

  document.getElementById('pin-container').style.opacity  = '0';
  document.getElementById('splash-hint').style.opacity    = '0';
  document.getElementById('splash-fleuron').style.opacity = '0';
  document.getElementById('splash-title').style.transition= 'opacity .4s';
  setTimeout(function(){ document.getElementById('splash-title').style.opacity='0'; }, 200);

  var s = document.getElementById('splash');
  s.classList.add('hide');
  setTimeout(function(){
    s.style.display = 'none';
    initButterflies();
  }, 900);
}
</script>
