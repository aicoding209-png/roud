<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>إلى رُدينا</title>
  <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

  <style>
    :root {
      --bg-deep:    #12163a;
      --pink:       #f2b5a8;
      --pink-dim:   #c4857a;
      --teal:       #5bc4b0;
      --teal-dim:   #7ab5ad;
      --red:        #c0392b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-deep);
      font-family: 'Noto Naskh Arabic', 'Amiri', serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* ── Lottie Background ── */
    #bgLottie {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      transition: opacity 2s ease;
    }
    #bgLottie.visible { opacity: 1; }
    #bgLottie svg {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      transform: none !important;
      width: 100vw !important; height: 100vh !important;
    }

    /* ── Stars ── */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .stars span {
      position: absolute; border-radius: 50%;
      animation: twinkle var(--d,3s) ease-in-out infinite alternate; opacity: 0;
    }
    .stars span.s-pink  { background: var(--pink); }
    .stars span.s-teal  { background: var(--teal); }
    @keyframes twinkle {
      0%   { opacity:0; transform:scale(.6); }
      100% { opacity:var(--op,.4); transform:scale(1.1); }
    }

    /* ── SPLASH ── */
    #splash {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; width: 100%;
    }
    #splash-inner { text-align: center; opacity: 0; margin-bottom: 80px; }

    /* ── Lottie Woman ── */
    #woman-lottie {
      width: 130px;
      height: 130px;
      margin: 0 auto 4px auto;
      display: block;
    }

    #splash-title {
      font-family: 'Amiri', serif;
      font-size: 2.6rem;
      color: var(--pink);
      margin-bottom: 28px;
      direction: rtl;
    }

    /* ── Date Picker (Drum) ── */
    #date-picker-wrap {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 22px;
      direction: rtl;
    }

    .drum { display: flex; flex-direction: column; align-items: center; gap: 4px; }

    /* اليوم والسنة: وردي */
    .drum.pink-drum .drum-label { color: var(--pink-dim); }
    .drum.pink-drum .drum-window {
      background: rgba(242,181,168,.06);
      border: 1px solid rgba(242,181,168,.3);
    }
    .drum.pink-drum .drum-selector {
      border: 1px solid rgba(91,196,176,.35);
      background: rgba(91,196,176,.08);
    }
    .drum.pink-drum .drum-item       { color: var(--teal-dim); }
    .drum.pink-drum .drum-item.active { color: var(--pink); }

    /* الشهر: فيروزي */
    .drum.teal-drum .drum-label { color: var(--teal-dim); }
    .drum.teal-drum .drum-window {
      background: rgba(91,196,176,.06);
      border: 1px solid rgba(91,196,176,.3);
    }
    .drum.teal-drum .drum-selector {
      border: 1px solid rgba(242,181,168,.35);
      background: rgba(242,181,168,.08);
    }
    .drum.teal-drum .drum-item       { color: var(--pink-dim); }
    .drum.teal-drum .drum-item.active { color: var(--teal); }

    .drum-label {
      font-size: 11px;
      margin-bottom: 2px;
      letter-spacing: .03em;
      font-family: 'Noto Naskh Arabic', serif;
    }

    .drum-window {
      width: 78px;
      height: 130px;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    .drum-window.wide { width: 96px; }

    .drum-window::before,
    .drum-window::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 36px;
      z-index: 2;
      pointer-events: none;
    }
    .drum-window::before {
      top: 0;
      background: linear-gradient(to bottom, var(--bg-deep) 0%, transparent 100%);
    }
    .drum-window::after {
      bottom: 0;
      background: linear-gradient(to top, var(--bg-deep) 0%, transparent 100%);
    }

    .drum-selector {
      position: absolute;
      top: 50%;
      left: 6px; right: 6px;
      height: 36px;
      transform: translateY(-50%);
      border-radius: 8px;
      z-index: 1;
      pointer-events: none;
    }

    .drum-list {
      overflow-y: scroll;
      height: 100%;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 47px 0;
    }
    .drum-list::-webkit-scrollbar { display: none; }

    .drum-item {
      scroll-snap-align: center;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Amiri', serif;
      font-size: 1.15rem;
      cursor: pointer;
      transition: color .2s, font-size .2s;
      user-select: none;
    }
    .drum-item.active { font-size: 1.25rem; }

    /* ── Confirm Button ── */
    #confirm-btn {
      margin-top: 4px;
      padding: 10px 38px;
      border-radius: 999px;
      background: rgba(91,196,176,.08);
      border: 1px solid rgba(91,196,176,.4);
      color: var(--pink);
      font-family: 'Noto Naskh Arabic', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: background .2s, border-color .2s, transform .1s;
      letter-spacing: .04em;
    }
    #confirm-btn:hover  { background: rgba(91,196,176,.18); border-color: var(--teal); }
    #confirm-btn:active { transform: scale(.96); }

    /* ── Error ── */
    #error-msg {
      font-family: 'Noto Naskh Arabic', serif;
      font-size: .85rem;
      color: var(--red);
      height: 20px;
      margin-top: 12px;
      direction: rtl;
    }

    @keyframes shake {
      0%,100%{transform:translateX(0);}
      20%{transform:translateX(-8px);}
      40%{transform:translateX(8px);}
      60%{transform:translateX(-6px);}
      80%{transform:translateX(6px);}
    }
    .shake { animation: shake .45s ease; }

    /* ── Word Animation ── */
    .word-anim { display:inline-block; opacity:0; transform:translateY(8px); }
    .word-anim.go { animation:wordFadeIn 0.3s ease forwards var(--wd,0ms); }
    @keyframes wordFadeIn { to { opacity:1; transform:translateY(0); } }

    /* ── Fireworks Overlay ── */
#fireworks-overlay {
  display: none;
} 

    .fw {
      width: 60%;
      height: 60%;
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div id="bgLottie"></div>

<div id="fireworks-overlay">
  <div id="fireworks-lottie-1" class="fw"></div>
</div>

<div id="splash">
  <div id="splash-inner">

    <div id="woman-lottie"></div>

    <div id="splash-title">إلى <span style="color:#c0392b">رُدينا</span></div>

    <!-- ── Date Picker ── -->
    <div id="date-picker-wrap">

      <!-- اليوم — وردي -->
      <div class="drum pink-drum">
        <div class="drum-label">اليوم</div>
        <div class="drum-window">
          <div class="drum-selector"></div>
          <div class="drum-list" id="list-day"></div>
        </div>
      </div>

      <!-- الشهر — فيروزي -->
      <div class="drum teal-drum">
        <div class="drum-label">الشهر</div>
        <div class="drum-window wide">
          <div class="drum-selector"></div>
          <div class="drum-list" id="list-month"></div>
        </div>
      </div>

      <!-- السنة — وردي -->
      <div class="drum pink-drum">
        <div class="drum-label">السنة</div>
        <div class="drum-window">
          <div class="drum-selector"></div>
          <div class="drum-list" id="list-year"></div>
        </div>
      </div>

    </div>

    <button id="confirm-btn" onclick="checkDate()">دخول</button>
    <div id="error-msg"></div>
  </div>
</div>

<script>


  // ── تفعيل Vibration API عند أول تفاعل ──
var vibrationUnlocked = false;
function unlockVibration() {
  if (!vibrationUnlocked) {
    navigator.vibrate && navigator.vibrate(1);
    vibrationUnlocked = true;
  }
}
document.addEventListener('touchstart', unlockVibration, { once: true });
document.addEventListener('mousedown',  unlockVibration, { once: true });
  
// ── Stars: متناوبة وردي وفيروزي ──
function initStars() {
  var sc = document.getElementById('stars');
  for (var i = 0; i < 120; i++) {
    var s  = document.createElement('span');
    var sz = Math.random() * 2.2 + .6;
    var cls = i % 2 === 0 ? 's-pink' : 's-teal';
    s.className = cls;
    s.style.cssText = 'width:'+sz+'px;height:'+sz+'px;top:'+(Math.random()*100)+'%;left:'+(Math.random()*100)+'%;--d:'+(Math.random()*4+2).toFixed(1)+'s;--op:'+(Math.random()*.35+.1).toFixed(2)+';animation-delay:'+(Math.random()*5).toFixed(1)+'s;';
    sc.appendChild(s);
  }
}

// ── Lottie Background Sky ──
function initBgSky() {
  lottie.loadAnimation({
    container:  document.getElementById('bgLottie'),
    renderer:   'svg',
    loop:       true,
    autoplay:   true,
    path:       'Moon-night-Sky.json',
    rendererSettings: { preserveAspectRatio: 'xMidYMid slice' }
  });
  setTimeout(function(){
    document.getElementById('bgLottie').classList.add('visible');
    setTimeout(animateSplashText, 1000);
  }, 100);
}

// ── Animate splash text ──
function animateSplashText() {
  var titleEl = document.getElementById('splash-title');
  titleEl.innerHTML =
    '<span class="word-anim" style="--wd:0ms; color:#f2b5a8">إلى</span> ' +
    '<span class="word-anim" style="--wd:220ms; color:#c0392b">رُدينا</span>';
  titleEl.querySelectorAll('.word-anim').forEach(function(w){ w.classList.add('go'); });

  var inner = document.getElementById('splash-inner');
  inner.style.transition = 'opacity 0.4s ease';
  inner.style.opacity    = '1';
}

// ── Lottie Woman ──
function initWoman() {
  lottie.loadAnimation({
    container:  document.getElementById('woman-lottie'),
    renderer:   'svg',
    loop:       true,
    autoplay:   true,
    path:       'Love-birds.json'
  });
}

// ── Date Picker Data ──
var MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو',
              'يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

var YEARS = [];
for (var y = 2000; y <= 2020; y++) YEARS.push(String(y));

var DAYS = [];
for (var d = 1; d <= 31; d++) DAYS.push(d < 10 ? '0'+d : String(d));

var CORRECT = { year: 2004, month: 1, day: 1 };

// ── بناء الـ Drum ──
function buildDrum(listId, items, defaultIndex) {
  var list = document.getElementById(listId);
  items.forEach(function(val, i) {
    var el = document.createElement('div');
    el.className = 'drum-item' + (i === defaultIndex ? ' active' : '');
    el.textContent = val;
    el.dataset.index = i;
    list.appendChild(el);
  });

  list.addEventListener('scroll', function() {
    updateActive(list);
  }, { passive: true });

  // ── الاهتزاز عبر touchmove (تفاعل مباشر) ──
  var lastVibIndex = -1;
  list.addEventListener('touchmove', function() {
    var center = list.scrollTop + list.clientHeight / 2;
    var items  = list.querySelectorAll('.drum-item');
    var current = -1;
    items.forEach(function(item, i) {
      var dist = Math.abs(item.offsetTop + 18 - center);
      if (dist < 20) current = i;
    });
    if (current !== -1 && current !== lastVibIndex) {
      lastVibIndex = current;
      if (navigator.vibrate) navigator.vibrate(8);
    }
  }, { passive: true });
  

  setTimeout(function() {
    list.scrollTop = defaultIndex * 36;
    updateActive(list);
  }, 80);

  var isDragging = false, startY = 0, startScroll = 0;
  list.addEventListener('mousedown', function(e) {
    isDragging  = true;
    startY      = e.clientY;
    startScroll = list.scrollTop;
    list.style.cursor = 'grabbing';
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    list.scrollTop = startScroll - (e.clientY - startY);
  });
  document.addEventListener('mouseup', function() {
    if (!isDragging) return;
    isDragging = false;
    list.style.cursor = '';
    var idx = Math.round(list.scrollTop / 36);
    list.scrollTo({ top: idx * 36, behavior: 'smooth' });
  });

  list.addEventListener('wheel', function(e) {
    e.preventDefault();
    var idx = Math.round(list.scrollTop / 36) + (e.deltaY > 0 ? 1 : -1);
    idx = Math.max(0, Math.min(items.length - 1, idx));
    list.scrollTo({ top: idx * 36, behavior: 'smooth' });
  }, { passive: false });
}

// تتبع آخر عنصر نشط لكل قائمة
var lastActiveIndex = {};

function updateActive(list) {
  var center = list.scrollTop + list.clientHeight / 2;
  var items  = list.querySelectorAll('.drum-item');
  var newActiveIndex = -1;

  items.forEach(function(item, i) {
    var dist = Math.abs(item.offsetTop + 18 - center);
    item.classList.toggle('active', dist < 20);
    if (dist < 20) newActiveIndex = i;
  });

// ── تحديث آخر index نشط فقط ──
  if (newActiveIndex !== -1) {
    lastActiveIndex[list.id] = newActiveIndex;
  }
}

function getSelectedIndex(listId) {
  var list    = document.getElementById(listId);
  var items   = list.querySelectorAll('.drum-item');
  var center  = list.scrollTop + list.clientHeight / 2;
  var closest = 0, minDist = Infinity;
  items.forEach(function(item, i) {
    var dist = Math.abs(item.offsetTop + 18 - center);
    if (dist < minDist) { minDist = dist; closest = i; }
  });
  return closest;
}

// ── التحقق ──
function checkDate() {
  var selYear  = parseInt(YEARS [getSelectedIndex('list-year')]);
  var selMonth = getSelectedIndex('list-month') + 1;
  var selDay   = parseInt(DAYS  [getSelectedIndex('list-day')]);
  var errEl    = document.getElementById('error-msg');

  if (selYear === CORRECT.year && selMonth === CORRECT.month && selDay === CORRECT.day) {
  sessionStorage.setItem('authenticated', '1');

  // ── إخفاء صناديق التاريخ والزر والخطأ ──
  document.getElementById('date-picker-wrap').style.display = 'none';
  document.getElementById('confirm-btn').style.display      = 'none';
  document.getElementById('error-msg').style.display        = 'none';

  // ── إظهار الألعاب النارية مكانهم ──
  var fwDiv = document.createElement('div');
  fwDiv.id = 'fw-inline';
  fwDiv.style.cssText = 'width:280px; height:280px; margin:0 auto;';
  document.getElementById('splash-inner').appendChild(fwDiv);

  lottie.loadAnimation({
    container: fwDiv,
    renderer:  'svg',
    loop:      false,
    autoplay:  true,
    path:      'fireworks.json'
  });

  setTimeout(function() {
    window.location.href = 'index.html';
  }, 4000);
}
  
  else {
    var picker = document.getElementById('date-picker-wrap');
    picker.classList.remove('shake');
    void picker.offsetWidth;
    picker.classList.add('shake');
    errEl.textContent = 'التاريخ غير صحيح، حاولي مره ثانية';
    setTimeout(function() {
      errEl.textContent = '';
      picker.classList.remove('shake');
    }, 1400);
  }
}

// ── Init ──
initStars();
initBgSky();
initWoman();
buildDrum('list-day',   DAYS,   0);
buildDrum('list-month', MONTHS, 0);
buildDrum('list-year',  YEARS,  0);
</script>
</body>
</html>
