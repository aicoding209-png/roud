<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>إلى رُدينا</title>
  <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <style>
    :root {
      --bg-deep:    #0d0a0f;
      --gold:       #c9a96e;
      --gold-light: #e8d4a8;
      --gold-dim:   #7a6340;
      --red:        #c0392b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-deep);
      font-family: 'Noto Naskh Arabic', 'Amiri', serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* ── Lottie Background ── */
    #bgLottie {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      transition: opacity 2s ease;
    }
    #bgLottie.visible { opacity: 1; }
    #bgLottie svg {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      transform: none !important;
      width: 100vw !important; height: 100vh !important;
    }

    /* ── Stars ── */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .stars span {
      position: absolute; border-radius: 50%; background: var(--gold-light);
      animation: twinkle var(--d,3s) ease-in-out infinite alternate; opacity: 0;
    }
    @keyframes twinkle {
      0%   { opacity:0; transform:scale(.6); }
      100% { opacity:var(--op,.4); transform:scale(1.1); }
    }

    /* ── SPLASH ── */
    #splash {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; width: 100%;
    }
    #splash-inner { text-align: center; opacity: 0; }
    #splash-fleuron {
      font-size: 2.2rem; color: var(--gold); opacity: .7; margin-bottom: 16px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:.7;} 50%{transform:scale(1.15);opacity:1;} }
    #splash-title { font-family:'Amiri',serif; font-size:2.6rem; color:var(--gold-light); margin-bottom:10px; direction:rtl; }
    #splash-hint  { font-family:'Noto Naskh Arabic',serif; font-size:.95rem; color:var(--gold-dim); margin-bottom:28px; direction:rtl; }
    #pin-dots { display:flex; justify-content:center; gap:14px; margin-bottom:8px; }
    .dot { width:16px; height:16px; border-radius:50%; border:1.5px solid var(--gold-dim); background:transparent; transition:background .2s,border-color .2s; }
    .dot.filled { background:var(--gold); border-color:var(--gold); }
    .dot.error  { background:var(--red); border-color:var(--red); }
    #error-msg { font-family:'Noto Naskh Arabic',serif; font-size:.85rem; color:var(--red); height:20px; margin-bottom:14px; direction:rtl; }
    #keypad { display:grid; grid-template-columns:repeat(3,70px); gap:12px; justify-content:center; direction:ltr; }
    .key {
      width:70px; height:70px; border-radius:50%;
      background:rgba(201,169,110,.07); border:1.5px solid #3a2e1e;
      color:var(--gold); font-family:'Amiri',serif; font-size:1.6rem;
      cursor:pointer; transition:background .15s,border-color .15s,transform .1s;
    }
    .key:hover  { background:rgba(201,169,110,.15); border-color:var(--gold-dim); }
    .key:active { transform:scale(.92); }
    .key.empty  { background:transparent; border:none; cursor:default; }
    .key.del    { font-size:1.2rem; color:var(--gold-dim); }

    /* ── Word Animation ── */
    .word-anim { display:inline-block; opacity:0; transform:translateY(8px); }
    .word-anim.go { animation:wordFadeIn 0.3s ease forwards var(--wd,0ms); }
    @keyframes wordFadeIn { to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div id="bgLottie"></div>

<div id="splash">
  <div id="splash-inner">
    <div id="splash-fleuron">❦</div>
    <div id="splash-title">إلى <span style="color:#c0392b">رُدينا</span></div>
    <div id="splash-hint">ارفعي صوت الجهاز</div>
    <div id="pin-container">
      <div id="pin-dots">
        <span class="dot" id="d0"></span><span class="dot" id="d1"></span>
        <span class="dot" id="d2"></span><span class="dot" id="d3"></span>
      </div>
      <div id="error-msg"></div>
      <div id="keypad">
        <button class="key" onclick="pressKey('1')">١</button>
        <button class="key" onclick="pressKey('2')">٢</button>
        <button class="key" onclick="pressKey('3')">٣</button>
        <button class="key" onclick="pressKey('4')">٤</button>
        <button class="key" onclick="pressKey('5')">٥</button>
        <button class="key" onclick="pressKey('6')">٦</button>
        <button class="key" onclick="pressKey('7')">٧</button>
        <button class="key" onclick="pressKey('8')">٨</button>
        <button class="key" onclick="pressKey('9')">٩</button>
        <button class="key empty"></button>
        <button class="key" onclick="pressKey('0')">٠</button>
        <button class="key del" onclick="deleteKey()">⌫</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Stars ──
function initStars() {
  var sc = document.getElementById('stars');
  for (var i = 0; i < 120; i++) {
    var s  = document.createElement('span');
    var sz = Math.random() * 2.2 + .6;
    s.style.cssText = 'width:'+sz+'px;height:'+sz+'px;top:'+(Math.random()*100)+'%;left:'+(Math.random()*100)+'%;--d:'+(Math.random()*4+2).toFixed(1)+'s;--op:'+(Math.random()*.35+.1).toFixed(2)+';animation-delay:'+(Math.random()*5).toFixed(1)+'s;';
    sc.appendChild(s);
  }
}

// ── Lottie Background Sky ──
function initBgSky() {
  lottie.loadAnimation({
    container:  document.getElementById('bgLottie'),
    renderer:   'svg',
    loop:       true,
    autoplay:   true,
    path:       'Moon-night-Sky.json',
    rendererSettings: { preserveAspectRatio: 'xMidYMid slice' }
  });
  setTimeout(function(){
    document.getElementById('bgLottie').classList.add('visible');
    setTimeout(animateSplashText, 1000);
  }, 100);
}

// ── Animate splash text word by word ──
function animateSplashText() {
  var titleEl = document.getElementById('splash-title');
  titleEl.innerHTML =
    '<span class="word-anim" style="--wd:0ms">إلى</span> ' +
    '<span class="word-anim" style="--wd:220ms; color:#c0392b">رُدينا</span>';
  titleEl.querySelectorAll('.word-anim').forEach(function(w){ w.classList.add('go'); });

  var inner = document.getElementById('splash-inner');
  inner.style.transition = 'opacity 0.4s ease';
  inner.style.opacity    = '1';
}

// ── PIN ──
var entered = '', correct = '0909';

function pressKey(k) {
  if (entered.length >= 4) return;
  entered += k;
  updateDots();
  if (entered.length === 4) checkCode();
}

function deleteKey() {
  entered = entered.slice(0, -1);
  updateDots();
  document.getElementById('error-msg').textContent = '';
}

function updateDots() {
  for (var i = 0; i < 4; i++) {
    var d = document.getElementById('d' + i);
    d.classList.toggle('filled', i < entered.length);
    d.classList.remove('error');
  }
}

function checkCode() {
  if (entered === correct) {
    // ← حفظ حالة المصادقة ثم التوجيه إلى الرسالة
    sessionStorage.setItem('authenticated', '1');
    window.location.href = 'index.html';
  } else {
    for (var i = 0; i < 4; i++) document.getElementById('d' + i).classList.add('error');
    document.getElementById('error-msg').textContent = 'الرمز غير صحيح، حاولي مجدداً';
    setTimeout(function() {
      entered = '';
      updateDots();
      document.getElementById('error-msg').textContent = '';
    }, 1200);
  }
}

// ── Init ──
initStars();
initBgSky();
</script>
</body>
</html>
